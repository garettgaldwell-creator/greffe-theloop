<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion securisee | JBSA Intranet</title>
  <link rel="icon" type="image/webp" href="seal.webp">
  <style>

:root {
  --navy: #0a0e1a;
  --navy-mid: #111827;
  --navy-light: #1e2d4a;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --gold-dim: #8b6f2e;
  --cream: #f5f0e8;
  --cream-dark: #e8e0d0;
  --white: #ffffff;
  --red: #8b1a1a;
  --red-light: #a52020;
  --gray: #6b7280;
  --gray-light: #d1d5db;
  --success: #166534;
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-ui: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --shadow-gold: 0 0 30px rgba(201, 168, 76, 0.15);
  --shadow-deep: 0 20px 60px rgba(0,0,0,0.5);
  --border-gold: 1px solid rgba(201, 168, 76, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3, h4, h5 { font-family: var(--font-display); }

.display-title {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.02em;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--gold);
}

.ui-text { font-family: var(--font-ui); }
.ui-label {
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ===== LAYOUT ===== */
.container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
.container-narrow { max-width: 800px; margin: 0 auto; padding: 0 2rem; }

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(10, 14, 26, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: var(--border-gold);
  padding: 0 2rem;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 1rem;
  text-decoration: none;
}

.navbar-logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.navbar-logo img { width: 100%; height: 100%; object-fit: contain; }

.navbar-name {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.navbar-name small {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream-dark);
  font-weight: 300;
}

.navbar-nav {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  list-style: none;
}

.navbar-nav a {
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cream-dark);
  text-decoration: none;
  padding: 0.5rem 0.9rem;
  border-radius: 3px;
  transition: all 0.2s;
}

.navbar-nav a:hover { color: var(--gold); background: rgba(201,168,76,0.08); }
.navbar-nav a.active { color: var(--gold); }

.btn-nav-login {
  background: var(--gold) !important;
  color: var(--navy) !important;
  font-weight: 700 !important;
  padding: 0.5rem 1.2rem !important;
}

.btn-nav-login:hover { background: var(--gold-light) !important; }

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding-top: 70px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--navy) 0%, #0d1525 100%);
}

.hero-lines {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
  padding: 4rem 0;
}

.hero-seal {
  display: flex;
  justify-content: center;
  align-items: center;
}

.seal-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
}

.seal-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.4);
  animation: rotateSeal 30s linear infinite;
}

.seal-ring::before {
  content: ';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.2);
}

.seal-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: var(--cream);
  padding: 15px;
  box-shadow: 0 0 60px rgba(201,168,76,0.2), var(--shadow-deep);
}

@keyframes rotateSeal {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.hero-text { }

.hero-eyebrow {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.hero-eyebrow::before {
  content: ';
  width: 40px;
  height: 1px;
  background: var(--gold);
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 1.5rem;
  color: var(--white);
}

.hero h1 em {
  font-style: italic;
  color: var(--gold);
}

.hero-desc {
  font-family: var(--font-body);
  font-size: 1.1rem;
  color: var(--cream-dark);
  opacity: 0.85;
  margin-bottom: 2.5rem;
  line-height: 1.8;
}

.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.8rem 1.8rem;
  border-radius: 3px;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
}

.btn-gold {
  background: var(--gold);
  color: var(--navy);
}

.btn-gold:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}

.btn-outline {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
}

.btn-outline:hover {
  background: rgba(201,168,76,0.1);
  transform: translateY(-2px);
}

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--cream);
  border: var(--border-gold);
}

.btn-ghost:hover { background: rgba(255,255,255,0.1); }

.btn-danger {
  background: var(--red);
  color: var(--white);
}

.btn-danger:hover { background: var(--red-light); }

.btn-sm { padding: 0.5rem 1rem; font-size: 0.65rem; }
.btn-lg { padding: 1rem 2.5rem; font-size: 0.8rem; }

/* ===== DIVIDER ===== */
.divider {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin: 3rem 0;
}

.divider::before, .divider::after {
  content: ';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
}

.divider-icon {
  color: var(--gold);
  font-size: 1.2rem;
}

/* ===== CARDS ===== */
.card {
  background: var(--navy-light);
  border: var(--border-gold);
  border-radius: 6px;
  padding: 2rem;
  transition: all 0.3s;
}

.card:hover {
  border-color: rgba(201,168,76,0.6);
  box-shadow: var(--shadow-gold);
  transform: translateY(-3px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
  padding-bottom: 1.2rem;
  border-bottom: var(--border-gold);
}

.card-icon {
  width: 50px;
  height: 50px;
  background: rgba(201,168,76,0.1);
  border: var(--border-gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

/* ===== SECTIONS ===== */
.section { padding: 6rem 0; }
.section-sm { padding: 3rem 0; }

.section-header {
  text-align: center;
  margin-bottom: 4rem;
}

.section-header .ui-label { margin-bottom: 0.8rem; display: block; }
.section-header .section-title { margin-bottom: 1rem; }
.section-header p {
  color: var(--cream-dark);
  opacity: 0.75;
  max-width: 600px;
  margin: 0 auto;
  font-size: 1.05rem;
}

/* ===== GRID ===== */
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

@media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .grid-4 { grid-template-columns: 1fr; }
  .hero-content { grid-template-columns: 1fr; }
  .hero-seal { order: -1; }
  .seal-wrapper { width: 220px; height: 220px; }
}

/* ===== BADGE / GRADE ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.2rem 0.7rem;
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
}

.badge-judge { background: rgba(139,26,26,0.25); color: #ef4444; border: 1px solid rgba(139,26,26,0.4); }
.badge-prosecutor { background: rgba(30,77,100,0.3); color: #60a5fa; border: 1px solid rgba(60,130,180,0.4); }
.badge-lawyer { background: rgba(22,101,52,0.25); color: #4ade80; border: 1px solid rgba(22,101,52,0.4); }
.badge-admin { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

/* ===== STAT BOX ===== */
.stat-box {
  text-align: center;
  padding: 2rem;
  background: rgba(201,168,76,0.04);
  border: var(--border-gold);
  border-radius: 6px;
}

.stat-number {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 0.4rem;
}

.stat-label {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream-dark);
  opacity: 0.7;
}

/* ===== FOOTER ===== */
.footer {
  background: #070a12;
  border-top: var(--border-gold);
  padding: 4rem 0 2rem;
}

.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  margin-bottom: 3rem;
}

.footer-brand .navbar-name { font-size: 1.1rem; margin-bottom: 1rem; }
.footer-brand p { color: var(--cream-dark); opacity: 0.6; font-size: 0.95rem; line-height: 1.7; }

.footer-col h4 {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.2rem;
}

.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 0.6rem; }
.footer-col ul a {
  color: var(--cream-dark);
  opacity: 0.65;
  text-decoration: none;
  font-size: 0.92rem;
  transition: all 0.2s;
}
.footer-col ul a:hover { opacity: 1; color: var(--gold); }

.footer-bottom {
  border-top: 1px solid rgba(201,168,76,0.15);
  padding-top: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-bottom p {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream-dark);
  opacity: 0.4;
}

@media (max-width: 768px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .navbar-nav { display: none; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.anim-fade-up { animation: fadeInUp 0.7s ease forwards; }
.anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
.anim-delay-2 { animation-delay: 0.2s; opacity: 0; }
.anim-delay-3 { animation-delay: 0.3s; opacity: 0; }
.anim-delay-4 { animation-delay: 0.4s; opacity: 0; }

/* ===== FORM ===== */
.form-group { margin-bottom: 1.5rem; }

.form-label {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 1rem;
  transition: all 0.2s;
  outline: none;
  -webkit-appearance: none;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}

.form-input::placeholder { color: rgba(245,240,232,0.3); }

.form-select option { background: var(--navy-mid); }

.form-textarea { resize: vertical; min-height: 100px; }

.form-error {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  color: #ef4444;
  margin-top: 0.4rem;
}

/* ===== ALERT ===== */
.alert {
  padding: 1rem 1.5rem;
  border-radius: 4px;
  font-family: var(--font-ui);
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}

.alert-error { background: rgba(139,26,26,0.2); border: 1px solid rgba(139,26,26,0.5); color: #fca5a5; }
.alert-success { background: rgba(22,101,52,0.2); border: 1px solid rgba(22,101,52,0.5); color: #86efac; }
.alert-info { background: rgba(201,168,76,0.1); border: var(--border-gold); color: var(--gold); }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
  font-size: 0.82rem;
}

thead th {
  background: rgba(201,168,76,0.1);
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.65rem;
  padding: 0.9rem 1rem;
  text-align: left;
  border-bottom: var(--border-gold);
}

tbody tr {
  border-bottom: 1px solid rgba(201,168,76,0.08);
  transition: background 0.15s;
}

tbody tr:hover { background: rgba(201,168,76,0.04); }

tbody td {
  padding: 0.9rem 1rem;
  color: var(--cream-dark);
}

/* ===== SIDEBAR ===== */
.layout-sidebar {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: #070a12;
  border-right: var(--border-gold);
  padding: 2rem 0;
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 1rem 1.5rem 2rem;
  border-bottom: var(--border-gold);
  margin-bottom: 1rem;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
  margin-bottom: 1rem;
}

.sidebar-logo img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--cream);
  padding: 3px;
}

.sidebar-logo span {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.sidebar-user {
  background: rgba(201,168,76,0.07);
  border: var(--border-gold);
  border-radius: 5px;
  padding: 0.8rem;
}

.sidebar-user-name {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 0.3rem;
}

.sidebar-nav { padding: 0 0.8rem; }

.sidebar-section-label {
  font-family: var(--font-ui);
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding: 1.2rem 0.8rem 0.5rem;
}

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.65rem 0.8rem;
  border-radius: 5px;
  text-decoration: none;
  font-family: var(--font-ui);
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  color: var(--cream-dark);
  transition: all 0.2s;
  margin-bottom: 0.15rem;
}

.sidebar-link:hover {
  background: rgba(201,168,76,0.08);
  color: var(--gold);
}

.sidebar-link.active {
  background: rgba(201,168,76,0.12);
  color: var(--gold);
  border-left: 2px solid var(--gold);
}

.sidebar-link .icon { font-size: 1rem; width: 20px; text-align: center; }

.main-content {
  margin-left: 260px;
  padding-top: 0;
  min-height: 100vh;
}

.page-header {
  background: rgba(10,14,26,0.8);
  border-bottom: var(--border-gold);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.page-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
}

.page-body { padding: 2rem; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--navy-mid);
  border: var(--border-gold);
  border-radius: 8px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  animation: fadeInUp 0.3s ease;
}

.modal-header {
  padding: 1.5rem 2rem;
  border-bottom: var(--border-gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 { font-size: 1.2rem; color: var(--white); }

.modal-close {
  background: none;
  border: none;
  color: var(--cream-dark);
  font-size: 1.5rem;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.modal-close:hover { opacity: 1; }

.modal-body { padding: 2rem; }
.modal-footer {
  padding: 1.5rem 2rem;
  border-top: var(--border-gold);
  display: flex;
  gap: 1rem;
  justify-content: flex-end;
}

/* ===== TABS ===== */
.tabs { display: flex; gap: 0; border-bottom: var(--border-gold); margin-bottom: 2rem; }

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 0.8rem 1.5rem;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream-dark);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: -1px;
}

.tab-btn:hover { color: var(--gold); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-content { display: none; }

        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    },
    set(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }
  };

  function ensureSeedData() {
    if (!localStorage.getItem('jbsa_users')) store.set('jbsa_users', defaultUsers);
    if (!localStorage.getItem('jbsa_announcements')) store.set('jbsa_announcements', defaultAnnouncements);
    if (!localStorage.getItem('jbsa_cases')) store.set('jbsa_cases', defaultCases);
    if (!localStorage.getItem('jbsa_hearings')) store.set('jbsa_hearings', defaultHearings);
  }

  function createSession(user) {
    const session = {
      userId: user.username,
      grade: user.grade,
      name: user.name,
      expires: Date.now() + (8 * 60 * 60 * 1000)
    };
    sessionStorage.setItem('jbsa_session', JSON.stringify(session));
    return session;
  }

  function getSession() {
    try {
      const raw = sessionStorage.getItem('jbsa_session');
      if (!raw) return null;
      const session = JSON.parse(raw);
      if (!session || !session.expires || session.expires < Date.now()) {
        sessionStorage.removeItem('jbsa_session');
        return null;
      }
      return session;
    } catch {
      sessionStorage.removeItem('jbsa_session');
      return null;
    }
  }

  function showAlert(message, type = 'error') {
    const box = document.getElementById('login-alert');
    if (!box) return;
    box.style.display = 'block';
    box.style.color = type === 'success' ? '#d1fae5' : '#fecaca';
    box.style.borderColor = type === 'success' ? 'rgba(34,197,94,0.35)' : 'rgba(239,68,68,0.35)';
    box.style.background = type === 'success' ? 'rgba(22,101,52,0.18)' : 'rgba(127,29,29,0.18)';
    box.textContent = message;
  }

  function login(username, password, requiredGrade) {
    const record = credentials.find((entry) =>
      entry.username.toLowerCase() === username.toLowerCase() &&
      entry.password === password
    );

    if (!record) {
      return { success: false, error: 'Identifiants invalides.' };
    }

    if (requiredGrade && record.grade !== requiredGrade && record.grade !== 'admin') {
      return { success: false, error: 'Ce compte ne correspond pas au role selectionne.' };
    }

    const users = store.get('jbsa_users', defaultUsers);
    const user = users.find((entry) => entry.username === record.username) || {
      username: record.username,
      grade: record.grade,
      name: record.name
    };

    createSession(user);
    return { success: true, user };
  }

  function logout() {
    sessionStorage.removeItem('jbsa_session');
    window.location.href = 'login.html';
  }

  function init() {
    ensureSeedData();
  }

  return {
    init,
    login,
    logout,
    showAlert,
    getSession
  };
})();

document.addEventListener('DOMContentLoaded', () => {
  JBSA.init();

  if (JBSA.getSession()) {
    window.location.href = 'intranet.html';
    return;
  }

  let selectedRole = null;
  const roleButtons = Array.from(document.querySelectorAll('.role-btn'));
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginButton = document.getElementById('login-btn');

  function applyRoleSelection(role, element) {
    selectedRole = role;
    roleButtons.forEach((button) => button.classList.remove('selected'));
    if (element) {
      element.classList.add('selected');
    }
    usernameInput.focus();
  }

  function selectRole(role, element) {
    applyRoleSelection(role, element);
  }

  function doLogin() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!selectedRole) {
      JBSA.showAlert('Veuillez selectionner votre role avant de vous connecter.', 'error');
      return;
    }

    if (!username || !password) {
      JBSA.showAlert('Veuillez saisir votre identifiant et votre mot de passe.', 'error');
      return;
    }

    loginButton.textContent = 'Verification...';
    loginButton.disabled = true;

    window.setTimeout(() => {
      const result = JBSA.login(username, password, selectedRole);

      if (result.success) {
        JBSA.showAlert('Acces autorise. Redirection...','success');
        window.setTimeout(() => {
          window.location.href = 'intranet.html';
        }, 800);
        return;
      }

      JBSA.showAlert(result.error, 'error');
      loginButton.innerHTML = "Acc&eacute;der &agrave; l'intranet &rarr;";
      loginButton.disabled = false;
    }, 300);
  }

  roleButtons.forEach((button) => {
    const role = button.classList.contains('judge')
      ? 'judge'
      : button.classList.contains('prosecutor')
        ? 'prosecutor'
        : 'lawyer';

    button.addEventListener('click', () => applyRoleSelection(role, button));
  });

  window.selectRole = selectRole;
  window.doLogin = doLogin;

  usernameInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      doLogin();
    }
  });

  passwordInput.addEventListener('keydown', (event) => {
    if (event.key === 'Enter') {
      doLogin();
    }
  });
});
</script>
</body>
</html>
