<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossiers — Intranet JBSA</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .filters { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }

    .filter-btn {
      background: rgba(255,255,255,0.04);
      border: var(--border-gold);
      border-radius: 3px;
      padding: 0.4rem 0.9rem;
      font-family: var(--font-ui);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dark);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border-color: rgba(201,168,76,0.5);
    }

    .case-card {
      background: var(--navy-light);
      border: var(--border-gold);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.25s;
      cursor: pointer;
    }

    .case-card:hover {
      border-color: rgba(201,168,76,0.6);
      box-shadow: var(--shadow-gold);
      transform: translateX(4px);
    }

    .case-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .case-card-id {
      font-family: var(--font-ui);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .case-card-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--white);
      margin-top: 0.2rem;
    }

    .case-card-body {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
      font-family: var(--font-ui);
      font-size: 0.7rem;
    }

    @media (max-width: 768px) { .case-card-body { grid-template-columns: repeat(2, 1fr); } }

    .case-field { }
    .case-field-label {
      display: block;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.2rem;
    }
    .case-field-val {
      color: var(--cream-dark);
      font-size: 0.78rem;
    }

    .priority-high { color: #ef4444; }
    .priority-medium { color: var(--gold); }
    .priority-low { color: #4ade80; }

    /* Modal case detail */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main-content">
  <div class="page-header">
    <h1>Gestion des Dossiers</h1>
    <button class="btn btn-gold btn-sm" onclick="openNewCase()">+ Nouveau Dossier</button>
  </div>

  <div class="page-body">
    <div id="alert-container"></div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterCases('all', this)">Tous</button>
      <button class="filter-btn" onclick="filterCases('open', this)">En cours</button>
      <button class="filter-btn" onclick="filterCases('pending', this)">En attente</button>
      <button class="filter-btn" onclick="filterCases('closed', this)">Clôturés</button>
      <div class="search-bar" style="margin-left:auto;">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher..." oninput="renderCases()">
      </div>
    </div>

    <div id="cases-container"></div>
  </div>
</div>

<!-- New Case Modal -->
<div id="new-case-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>📂 Nouveau Dossier</h3>
      <button class="modal-close" onclick="closeNewCase()">×</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid">
        <div class="form-group">
          <label class="form-label">Intitulé de l'Affaire</label>
          <input type="text" id="nc-title" class="form-input" placeholder="État vs. ...">
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="nc-type" class="form-select">
            <option>Criminel</option>
            <option>Correctionnel</option>
            <option>Civil</option>
            <option>Administratif</option>
          </select>
        </div>
      </div>
      <div class="detail-grid">
        <div class="form-group">
          <label class="form-label">Priorité</label>
          <select id="nc-priority" class="form-select">
            <option value="high">Haute</option>
            <option value="medium" selected>Moyenne</option>
            <option value="low">Basse</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Prochaine Audience</label>
          <input type="date" id="nc-hearing" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="nc-desc" class="form-textarea" placeholder="Résumé des faits..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNewCase()">Annuler</button>
      <button class="btn btn-gold" onclick="saveCase()">Créer le Dossier</button>
    </div>
  </div>
</div>

<!-- Case Detail Modal -->
<div id="detail-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:700px;">
    <div class="modal-header">
      <div>
        <h3 id="detail-title">Dossier</h3>
        <div id="detail-id" style="font-family:var(--font-ui);font-size:0.68rem;color:var(--gold-dim);margin-top:0.2rem;"></div>
      </div>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDetail()">Fermer</button>
      <button class="btn btn-danger btn-sm" id="delete-btn">Supprimer</button>
    </div>
  </div>
</div>

<script src="../js/jbsa.js"></script>
<script>
  const session = JBSA.requireAuth();
  if (!session) throw new Error('Not auth');

  document.getElementById('sidebar-mount').innerHTML = JBSA.buildSidebar(session.grade, 'cases');

  let currentFilter = 'all';
  let currentCaseId = null;

  function renderCases() {
    const cases = JBSA.store.get('cases') || [];
    const search = document.getElementById('search-input').value.toLowerCase();

    const filtered = cases.filter(c => {
      const matchFilter = currentFilter === 'all' || c.status === currentFilter;
      const matchSearch = !search || c.title.toLowerCase().includes(search) || c.id.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    const container = document.getElementById('cases-container');
    if (!filtered.length) {
      container.innerHTML = '<div class="alert alert-info">ℹ Aucun dossier trouvé.</div>';
      return;
    }

    container.innerHTML = filtered.map(c => `
      <div class="case-card" onclick="openDetail('${c.id}')">
        <div class="case-card-header">
          <div>
            <div class="case-card-id">${c.id} · ${c.type}</div>
            <div class="case-card-title">${c.title}</div>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center;flex-shrink:0;">
            <span class="badge ${c.status === 'open' ? 'badge-lawyer' : c.status === 'pending' ? 'badge-admin' : ''}">
              <span class="status-dot ${JBSA.getStatusClass(c.status)}"></span>
              ${JBSA.getStatusLabel(c.status)}
            </span>
            <span class="priority-${c.priority}" style="font-family:var(--font-ui);font-size:0.65rem;">▲ ${JBSA.getPriorityLabel(c.priority)}</span>
          </div>
        </div>
        <div class="case-card-body">
          <div class="case-field">
            <span class="case-field-label">Juge</span>
            <span class="case-field-val">${c.judge || '—'}</span>
          </div>
          <div class="case-field">
            <span class="case-field-label">Procureur</span>
            <span class="case-field-val">${c.prosecutor || '—'}</span>
          </div>
          <div class="case-field">
            <span class="case-field-label">Avocat</span>
            <span class="case-field-val">${c.lawyer || '—'}</span>
          </div>
          <div class="case-field">
            <span class="case-field-label">Prochaine Audience</span>
            <span class="case-field-val">${c.nextHearing ? JBSA.formatDate(c.nextHearing) : '—'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterCases(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCases();
  }

  function openNewCase() {
    document.getElementById('new-case-modal').classList.remove('hidden');
  }

  function closeNewCase() {
    document.getElementById('new-case-modal').classList.add('hidden');
  }

  function saveCase() {
    const title = document.getElementById('nc-title').value.trim();
    if (!title) { JBSA.showAlert('Veuillez renseigner l\'intitulé.', 'error'); return; }

    const user = JBSA.getCurrentUser();
    const cases = JBSA.store.get('cases') || [];
    const newCase = {
      id: JBSA.generateId(),
      title,
      type: document.getElementById('nc-type').value,
      priority: document.getElementById('nc-priority').value,
      status: 'open',
      judge: session.grade === 'judge' ? user?.name : null,
      prosecutor: session.grade === 'prosecutor' ? user?.name : null,
      lawyer: session.grade === 'lawyer' ? user?.name : null,
      created: new Date().toISOString().split('T')[0],
      nextHearing: document.getElementById('nc-hearing').value || null,
      description: document.getElementById('nc-desc').value
    };

    cases.unshift(newCase);
    JBSA.store.set('cases', cases);
    closeNewCase();
    renderCases();
    JBSA.showAlert('Dossier créé avec succès.', 'success');
  }

  function openDetail(id) {
    const cases = JBSA.store.get('cases') || [];
    const c = cases.find(x => x.id === id);
    if (!c) return;
    currentCaseId = id;

    document.getElementById('detail-title').textContent = c.title;
    document.getElementById('detail-id').textContent = c.id + ' · ' + c.type;
    document.getElementById('detail-body').innerHTML = `
      <div class="detail-grid">
        <div><span class="ui-label">Statut</span>
          <div class="mt-1"><span class="status-dot ${JBSA.getStatusClass(c.status)}"></span>${JBSA.getStatusLabel(c.status)}</div>
        </div>
        <div><span class="ui-label">Priorité</span>
          <div class="mt-1 priority-${c.priority}">${JBSA.getPriorityLabel(c.priority)}</div>
        </div>
        <div><span class="ui-label">Créé le</span>
          <div class="mt-1" style="color:var(--cream-dark);font-size:0.9rem;">${JBSA.formatDate(c.created)}</div>
        </div>
        <div><span class="ui-label">Prochaine Audience</span>
          <div class="mt-1" style="color:var(--cream-dark);font-size:0.9rem;">${c.nextHearing ? JBSA.formatDate(c.nextHearing) : '—'}</div>
        </div>
      </div>
      <div class="detail-grid">
        <div><span class="ui-label">Juge</span>
          <div class="mt-1" style="color:var(--cream-dark);">${c.judge || '—'}</div>
        </div>
        <div><span class="ui-label">Procureur</span>
          <div class="mt-1" style="color:var(--cream-dark);">${c.prosecutor || '—'}</div>
        </div>
        <div><span class="ui-label">Avocat de la Défense</span>
          <div class="mt-1" style="color:var(--cream-dark);">${c.lawyer || '—'}</div>
        </div>
      </div>
      ${c.description ? `<div class="form-group"><span class="ui-label">Description</span><div class="content-area mt-1"><p>${c.description}</p></div></div>` : ''}
      
      ${session.grade === 'admin' || session.grade === 'judge' ? `
      <div class="form-group mt-4" style="border-top:var(--border-gold);padding-top:1.5rem;">
        <span class="ui-label">Modifier le Statut</span>
        <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
          <button class="btn btn-ghost btn-sm" onclick="updateStatus('${id}','open')">En cours</button>
          <button class="btn btn-ghost btn-sm" onclick="updateStatus('${id}','pending')">En attente</button>
          <button class="btn btn-ghost btn-sm" onclick="updateStatus('${id}','closed')">Clôturer</button>
        </div>
      </div>` : ''}
    `;

    document.getElementById('delete-btn').style.display = session.grade === 'admin' ? 'inline-flex' : 'none';
    document.getElementById('delete-btn').onclick = () => deleteCase(id);

    document.getElementById('detail-modal').classList.remove('hidden');
  }

  function closeDetail() {
    document.getElementById('detail-modal').classList.add('hidden');
  }

  function updateStatus(id, status) {
    const cases = JBSA.store.get('cases') || [];
    const idx = cases.findIndex(c => c.id === id);
    if (idx !== -1) { cases[idx].status = status; JBSA.store.set('cases', cases); }
    closeDetail();
    renderCases();
    JBSA.showAlert('Statut mis à jour.', 'success');
  }

  function deleteCase(id) {
    if (!confirm('Supprimer ce dossier ?')) return;
    let cases = JBSA.store.get('cases') || [];
    cases = cases.filter(c => c.id !== id);
    JBSA.store.set('cases', cases);
    closeDetail();
    renderCases();
    JBSA.showAlert('Dossier supprimé.', 'success');
  }

  renderCases();
</script>
</body>
</html>
