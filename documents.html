<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — Intranet JBSA</title>
  <style>

:root {
  --navy: #0a0e1a;
  --navy-mid: #111827;
  --navy-light: #1e2d4a;
  --gold: #c9a84c;
  --gold-light: #e8c96a;
  --gold-dim: #8b6f2e;
  --cream: #f5f0e8;
  --cream-dark: #e8e0d0;
  --white: #ffffff;
  --red: #8b1a1a;
  --red-light: #a52020;
  --gray: #6b7280;
  --gray-light: #d1d5db;
  --success: #166534;
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body: Georgia, 'Times New Roman', serif;
  --font-ui: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --shadow-gold: 0 0 30px rgba(201, 168, 76, 0.15);
  --shadow-deep: 0 20px 60px rgba(0,0,0,0.5);
  --border-gold: 1px solid rgba(201, 168, 76, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.7;
  min-height: 100vh;
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3, h4, h5 { font-family: var(--font-display); }

.display-title {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.02em;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--gold);
}

.ui-text { font-family: var(--font-ui); }
.ui-label {
  font-family: var(--font-ui);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
}

/* ===== LAYOUT ===== */
.container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
.container-narrow { max-width: 800px; margin: 0 auto; padding: 0 2rem; }

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(10, 14, 26, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: var(--border-gold);
  padding: 0 2rem;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 1rem;
  text-decoration: none;
}

.navbar-logo {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.navbar-logo img { width: 100%; height: 100%; object-fit: contain; }

.navbar-name {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.navbar-name small {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream-dark);
  font-weight: 300;
}

.navbar-nav {
  display: flex;
  align-items: center;
  gap: 0.25rem;
  list-style: none;
}

.navbar-nav a {
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cream-dark);
  text-decoration: none;
  padding: 0.5rem 0.9rem;
  border-radius: 3px;
  transition: all 0.2s;
}

.navbar-nav a:hover { color: var(--gold); background: rgba(201,168,76,0.08); }
.navbar-nav a.active { color: var(--gold); }

.btn-nav-login {
  background: var(--gold) !important;
  color: var(--navy) !important;
  font-weight: 700 !important;
  padding: 0.5rem 1.2rem !important;
}

.btn-nav-login:hover { background: var(--gold-light) !important; }

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding-top: 70px;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--navy) 0%, #0d1525 100%);
}

.hero-lines {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(201,168,76,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
}

.hero-content {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
  padding: 4rem 0;
}

.hero-seal {
  display: flex;
  justify-content: center;
  align-items: center;
}

.seal-wrapper {
  position: relative;
  width: 320px;
  height: 320px;
}

.seal-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(201,168,76,0.4);
  animation: rotateSeal 30s linear infinite;
}

.seal-ring::before {
  content: '';
  position: absolute;
  inset: 8px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.2);
}

.seal-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: var(--cream);
  padding: 15px;
  box-shadow: 0 0 60px rgba(201,168,76,0.2), var(--shadow-deep);
}

@keyframes rotateSeal {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.hero-text { }

.hero-eyebrow {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}

.hero-eyebrow::before {
  content: '';
  width: 40px;
  height: 1px;
  background: var(--gold);
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 900;
  line-height: 1.05;
  margin-bottom: 1.5rem;
  color: var(--white);
}

.hero h1 em {
  font-style: italic;
  color: var(--gold);
}

.hero-desc {
  font-family: var(--font-body);
  font-size: 1.1rem;
  color: var(--cream-dark);
  opacity: 0.85;
  margin-bottom: 2.5rem;
  line-height: 1.8;
}

.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.8rem 1.8rem;
  border-radius: 3px;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 600;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.25s;
}

.btn-gold {
  background: var(--gold);
  color: var(--navy);
}

.btn-gold:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(201,168,76,0.3);
}

.btn-outline {
  background: transparent;
  color: var(--gold);
  border: 1px solid var(--gold);
}

.btn-outline:hover {
  background: rgba(201,168,76,0.1);
  transform: translateY(-2px);
}

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--cream);
  border: var(--border-gold);
}

.btn-ghost:hover { background: rgba(255,255,255,0.1); }

.btn-danger {
  background: var(--red);
  color: var(--white);
}

.btn-danger:hover { background: var(--red-light); }

.btn-sm { padding: 0.5rem 1rem; font-size: 0.65rem; }
.btn-lg { padding: 1rem 2.5rem; font-size: 0.8rem; }

/* ===== DIVIDER ===== */
.divider {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin: 3rem 0;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
}

.divider-icon {
  color: var(--gold);
  font-size: 1.2rem;
}

/* ===== CARDS ===== */
.card {
  background: var(--navy-light);
  border: var(--border-gold);
  border-radius: 6px;
  padding: 2rem;
  transition: all 0.3s;
}

.card:hover {
  border-color: rgba(201,168,76,0.6);
  box-shadow: var(--shadow-gold);
  transform: translateY(-3px);
}

.card-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.2rem;
  padding-bottom: 1.2rem;
  border-bottom: var(--border-gold);
}

.card-icon {
  width: 50px;
  height: 50px;
  background: rgba(201,168,76,0.1);
  border: var(--border-gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}

/* ===== SECTIONS ===== */
.section { padding: 6rem 0; }
.section-sm { padding: 3rem 0; }

.section-header {
  text-align: center;
  margin-bottom: 4rem;
}

.section-header .ui-label { margin-bottom: 0.8rem; display: block; }
.section-header .section-title { margin-bottom: 1rem; }
.section-header p {
  color: var(--cream-dark);
  opacity: 0.75;
  max-width: 600px;
  margin: 0 auto;
  font-size: 1.05rem;
}

/* ===== GRID ===== */
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }

@media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .grid-4 { grid-template-columns: 1fr; }
  .hero-content { grid-template-columns: 1fr; }
  .hero-seal { order: -1; }
  .seal-wrapper { width: 220px; height: 220px; }
}

/* ===== BADGE / GRADE ===== */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.2rem 0.7rem;
  border-radius: 20px;
  font-family: var(--font-ui);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
}

.badge-judge { background: rgba(139,26,26,0.25); color: #ef4444; border: 1px solid rgba(139,26,26,0.4); }
.badge-prosecutor { background: rgba(30,77,100,0.3); color: #60a5fa; border: 1px solid rgba(60,130,180,0.4); }
.badge-lawyer { background: rgba(22,101,52,0.25); color: #4ade80; border: 1px solid rgba(22,101,52,0.4); }
.badge-admin { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

/* ===== STAT BOX ===== */
.stat-box {
  text-align: center;
  padding: 2rem;
  background: rgba(201,168,76,0.04);
  border: var(--border-gold);
  border-radius: 6px;
}

.stat-number {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 0.4rem;
}

.stat-label {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--cream-dark);
  opacity: 0.7;
}

/* ===== FOOTER ===== */
.footer {
  background: #070a12;
  border-top: var(--border-gold);
  padding: 4rem 0 2rem;
}

.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem;
  margin-bottom: 3rem;
}

.footer-brand .navbar-name { font-size: 1.1rem; margin-bottom: 1rem; }
.footer-brand p { color: var(--cream-dark); opacity: 0.6; font-size: 0.95rem; line-height: 1.7; }

.footer-col h4 {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.2rem;
}

.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 0.6rem; }
.footer-col ul a {
  color: var(--cream-dark);
  opacity: 0.65;
  text-decoration: none;
  font-size: 0.92rem;
  transition: all 0.2s;
}
.footer-col ul a:hover { opacity: 1; color: var(--gold); }

.footer-bottom {
  border-top: 1px solid rgba(201,168,76,0.15);
  padding-top: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-bottom p {
  font-family: var(--font-ui);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream-dark);
  opacity: 0.4;
}

@media (max-width: 768px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .navbar-nav { display: none; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.anim-fade-up { animation: fadeInUp 0.7s ease forwards; }
.anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
.anim-delay-2 { animation-delay: 0.2s; opacity: 0; }
.anim-delay-3 { animation-delay: 0.3s; opacity: 0; }
.anim-delay-4 { animation-delay: 0.4s; opacity: 0; }

/* ===== FORM ===== */
.form-group { margin-bottom: 1.5rem; }

.form-label {
  display: block;
  font-family: var(--font-ui);
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 1rem;
  transition: all 0.2s;
  outline: none;
  -webkit-appearance: none;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}

.form-input::placeholder { color: rgba(245,240,232,0.3); }

.form-select option { background: var(--navy-mid); }

.form-textarea { resize: vertical; min-height: 100px; }

.form-error {
  font-family: var(--font-ui);
  font-size: 0.68rem;
  color: #ef4444;
  margin-top: 0.4rem;
}

/* ===== ALERT ===== */
.alert {
  padding: 1rem 1.5rem;
  border-radius: 4px;
  font-family: var(--font-ui);
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}

.alert-error { background: rgba(139,26,26,0.2); border: 1px solid rgba(139,26,26,0.5); color: #fca5a5; }
.alert-success { background: rgba(22,101,52,0.2); border: 1px solid rgba(22,101,52,0.5); color: #86efac; }
.alert-info { background: rgba(201,168,76,0.1); border: var(--border-gold); color: var(--gold); }

/* ===== TABLE ===== */
.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-ui);
  font-size: 0.82rem;
}

thead th {
  background: rgba(201,168,76,0.1);
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-size: 0.65rem;
  padding: 0.9rem 1rem;
  text-align: left;
  border-bottom: var(--border-gold);
}

tbody tr {
  border-bottom: 1px solid rgba(201,168,76,0.08);
  transition: background 0.15s;
}

tbody tr:hover { background: rgba(201,168,76,0.04); }

tbody td {
  padding: 0.9rem 1rem;
  color: var(--cream-dark);
}

/* ===== SIDEBAR ===== */
.layout-sidebar {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: #070a12;
  border-right: var(--border-gold);
  padding: 2rem 0;
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  height: 100vh;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-header {
  padding: 1rem 1.5rem 2rem;
  border-bottom: var(--border-gold);
  margin-bottom: 1rem;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
  margin-bottom: 1rem;
}

.sidebar-logo img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--cream);
  padding: 3px;
}

.sidebar-logo span {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1.2;
}

.sidebar-user {
  background: rgba(201,168,76,0.07);
  border: var(--border-gold);
  border-radius: 5px;
  padding: 0.8rem;
}

.sidebar-user-name {
  font-family: var(--font-ui);
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 0.3rem;
}

.sidebar-nav { padding: 0 0.8rem; }

.sidebar-section-label {
  font-family: var(--font-ui);
  font-size: 0.58rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  padding: 1.2rem 0.8rem 0.5rem;
}

.sidebar-link {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.65rem 0.8rem;
  border-radius: 5px;
  text-decoration: none;
  font-family: var(--font-ui);
  font-size: 0.78rem;
  letter-spacing: 0.05em;
  color: var(--cream-dark);
  transition: all 0.2s;
  margin-bottom: 0.15rem;
}

.sidebar-link:hover {
  background: rgba(201,168,76,0.08);
  color: var(--gold);
}

.sidebar-link.active {
  background: rgba(201,168,76,0.12);
  color: var(--gold);
  border-left: 2px solid var(--gold);
}

.sidebar-link .icon { font-size: 1rem; width: 20px; text-align: center; }

.main-content {
  margin-left: 260px;
  padding-top: 0;
  min-height: 100vh;
}

.page-header {
  background: rgba(10,14,26,0.8);
  border-bottom: var(--border-gold);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.page-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
}

.page-body { padding: 2rem; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--navy-mid);
  border: var(--border-gold);
  border-radius: 8px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  animation: fadeInUp 0.3s ease;
}

.modal-header {
  padding: 1.5rem 2rem;
  border-bottom: var(--border-gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 { font-size: 1.2rem; color: var(--white); }

.modal-close {
  background: none;
  border: none;
  color: var(--cream-dark);
  font-size: 1.5rem;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.modal-close:hover { opacity: 1; }

.modal-body { padding: 2rem; }
.modal-footer {
  padding: 1.5rem 2rem;
  border-top: var(--border-gold);
  display: flex;
  gap: 1rem;
  justify-content: flex-end;
}

/* ===== TABS ===== */
.tabs { display: flex; gap: 0; border-bottom: var(--border-gold); margin-bottom: 2rem; }

.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 0.8rem 1.5rem;
  font-family: var(--font-ui);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream-dark);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: -1px;
}

.tab-btn:hover { color: var(--gold); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== UTILITY ===== */

    // Validate against encoded credential store

    if (!match) return { success: false, error: 'Invalid credentials. Please try again.' };

    const grade = match[2];

    // If a role was selected, enforce it

    }

    const users = store.get('users') || [];
    const userProfile = users.find(u => u.username === username && u.active !== false);
    if (!userProfile) return { success: false, error: 'Account is inactive. Contact your administrator.' };

    const session = {
      userId: userProfile.id,
      grade: userProfile.grade,
      name: userProfile.name,
      expires: Date.now() + 8 * 3600000
    };
    sessionStorage.setItem('jbsa_session', JSON.stringify(session));
    return { success: true, grade };
  }

  function logout() {
    sessionStorage.removeItem('jbsa_session');
    const base = window.location.pathname.includes('/pages/') ? '../' : '';

  function getSession() {
    try {
      const s = JSON.parse(sessionStorage.getItem('jbsa_session'));
      if (s && s.expires > Date.now()) return s;
      sessionStorage.removeItem('jbsa_session');
      return null;
    } catch { return null; }
  }

  function requireAuth(allowedGrades = null) {
    const session = getSession();
    const base = window.location.pathname.includes('/pages/') ? '../' : '';
    if (!session) { window.location.href = base + 'login.html'; return null; }
    if (allowedGrades && !allowedGrades.includes(session.grade)) {
      window.location.href = base + 'pages/intranet.html';
      return null;
    }
    return session;
  }

</script>
<script>
  const session = JBSA.requireAuth();
  if (!session) throw new Error();

  document.getElementById('sidebar-mount').innerHTML = JBSA.buildSidebar(session.grade, 'documents');

  const typeIcons = {
    'Judgment': '⚖️', "Acte d'accusation": '📋', 'Ordonnance': '📜',
    'Requête': '📝', 'Autre': '📄'
  };

  let currentFilter = 'all';

  // Init default docs if needed
  if (!JBSA.store.get('documents')) {
    JBSA.store.set('documents', [
      { id: 1, name: 'Acte d\'accusation — Marcus Webb', category: "Acte d'accusation", caseId: 'SA-2025-0142', author: 'Thomas Johnson', grade: 'prosecutor', date: '2025-03-16', visibility: 'all', notes: 'Chef d\'accusation principal : meurtre au premier degré.' },
      { id: 2, name: 'Ordonnance de mise en détention — Marcus Webb', category: 'Ordonnance', caseId: 'SA-2025-0142', author: 'Hon. Robert Marshall', grade: 'judge', date: '2025-03-17', visibility: 'all', notes: 'Détention provisoire ordonnée sans possibilité de liberté sous caution.' },
      { id: 3, name: 'Requête en irrecevabilité — Diana Torres', category: 'Requête', caseId: 'SA-2025-0118', author: 'Me. Sofia Garcia', grade: 'lawyer', date: '2025-03-05', visibility: 'all', notes: 'Contestation de la légalité de la perquisition.' }
    ]);
  }

  function renderDocs() {
    const docs = JBSA.store.get('documents') || [];
    const cases = JBSA.store.get('cases') || [];

    const visible = docs.filter(d => {
      const matchVis = d.visibility === 'all' || d.visibility === session.grade || session.grade === 'admin';
      const matchCat = currentFilter === 'all' || d.category === currentFilter;
      return matchVis && matchCat;
    });

    const container = document.getElementById('docs-list');
    if (!visible.length) {
      container.innerHTML = '<div class="alert alert-info">ℹ Aucun document disponible.</div>';
      return;
    }

    const g = JBSA.getGradeConfig;
    container.innerHTML = visible.map(d => {
      const c = cases.find(x => x.id === d.caseId);
      return `
      <div class="doc-card">
        <div class="doc-icon">${typeIcons[d.category] || '📄'}</div>
        <div class="doc-info">
          <div class="doc-name">${d.name}</div>
          <div class="doc-meta">
            ${d.category} · ${c ? c.id + ' — ' + c.title.substring(0,30) : '—'} · 
            <span class="badge ${g(d.grade).badgeClass}" style="font-size:0.55rem;">${d.author}</span> · 
            ${JBSA.formatDate(d.date)}
          </div>
          ${d.notes ? `<div style="font-size:0.88rem;color:var(--cream-dark);opacity:0.7;margin-top:0.3rem;">${d.notes}</div>` : ''}
        </div>
        <div class="doc-actions">
          <button class="btn btn-ghost btn-sm" onclick="viewDoc(${d.id})">Voir</button>
          ${session.grade === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})">×</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function filterDocs(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDocs();
  }

  function openModal() {
    const cases = JBSA.store.get('cases') || [];
    document.getElementById('d-case').innerHTML = '<option value="">— Aucun —</option>' +
      cases.map(c => `<option value="${c.id}">${c.id} — ${c.title}</option>`).join('');
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function saveDoc() {
    const name = document.getElementById('d-name').value.trim();
    if (!name) { JBSA.showAlert('Nom requis.', 'error'); return; }

    const user = JBSA.getCurrentUser();
    const docs = JBSA.store.get('documents') || [];
    docs.unshift({
      id: Date.now(),
      name,
      category: document.getElementById('d-cat').value,
      caseId: document.getElementById('d-case').value || null,
      author: user ? user.name : session.name,
      grade: session.grade,
      date: new Date().toISOString().split('T')[0],
      visibility: document.getElementById('d-visibility').value,
      notes: document.getElementById('d-notes').value
    });

    JBSA.store.set('documents', docs);
    closeModal();
    renderDocs();
    JBSA.showAlert('Document enregistré.', 'success');
  }

  function viewDoc(id) {
    const docs = JBSA.store.get('documents') || [];
    const d = docs.find(x => x.id === id);
    if (!d) return;
    alert(`📄 ${d.name}\n\nCatégorie : ${d.category}\nAuteur : ${d.author}\nDate : ${JBSA.formatDate(d.date)}\n\n${d.notes || ''}`);
  }

  function deleteDoc(id) {
    if (!confirm('Supprimer ce document ?')) return;
    let docs = JBSA.store.get('documents') || [];
    docs = docs.filter(d => d.id !== id);
    JBSA.store.set('documents', docs);
    renderDocs();
    JBSA.showAlert('Document supprimé.', 'success');
  }

  renderDocs();
</script>
</body>
</html>
