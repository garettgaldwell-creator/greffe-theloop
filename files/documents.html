<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — Intranet JBSA</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .doc-card {
      background: var(--navy-light);
      border: var(--border-gold);
      border-radius: 6px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 0.8rem;
      transition: all 0.2s;
    }

    .doc-card:hover { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.03); }

    .doc-icon {
      font-size: 2rem;
      flex-shrink: 0;
    }

    .doc-info { flex: 1; }
    .doc-name { font-size: 1rem; color: var(--white); font-weight: 600; margin-bottom: 0.2rem; }
    .doc-meta {
      font-family: var(--font-ui);
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      color: var(--cream-dark);
      opacity: 0.55;
    }

    .doc-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .category-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="main-content">
  <div class="page-header">
    <h1>Documents & Actes</h1>
    <button class="btn btn-gold btn-sm" onclick="openModal()">+ Déposer un Document</button>
  </div>

  <div class="page-body">
    <div id="alert-container"></div>

    <div class="category-bar">
      <button class="filter-btn active" onclick="filterDocs('all',this)">Tous</button>
      <button class="filter-btn" onclick="filterDocs('Jugement',this)">Jugements</button>
      <button class="filter-btn" onclick="filterDocs('Acte d\'accusation',this)">Actes d'accusation</button>
      <button class="filter-btn" onclick="filterDocs('Ordonnance',this)">Ordonnances</button>
      <button class="filter-btn" onclick="filterDocs('Requête',this)">Requêtes</button>
      <button class="filter-btn" onclick="filterDocs('Autre',this)">Autres</button>
    </div>

    <div id="docs-list"></div>
  </div>
</div>

<!-- Upload Modal -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>📄 Déposer un Document</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nom du Document</label>
        <input type="text" id="d-name" class="form-input" placeholder="ex: Acte d'accusation — Marcus Webb">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label">Catégorie</label>
          <select id="d-cat" class="form-select">
            <option>Jugement</option>
            <option>Acte d'accusation</option>
            <option>Ordonnance</option>
            <option>Requête</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Dossier Lié</label>
          <select id="d-case" class="form-select"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Visibilité</label>
        <select id="d-visibility" class="form-select">
          <option value="all">Tous les membres</option>
          <option value="judge">Juges uniquement</option>
          <option value="prosecutor">Procureurs uniquement</option>
          <option value="lawyer">Avocats uniquement</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes / Résumé</label>
        <textarea id="d-notes" class="form-textarea" placeholder="Brève description du document..."></textarea>
      </div>
      <div class="alert alert-info">ℹ Dans cette version de démonstration, les documents sont enregistrés sous forme de métadonnées. Dans la version production, connectez un service de stockage de fichiers.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" onclick="saveDoc()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="../js/jbsa.js"></script>
<script>
  const session = JBSA.requireAuth();
  if (!session) throw new Error();

  document.getElementById('sidebar-mount').innerHTML = JBSA.buildSidebar(session.grade, 'documents');

  const typeIcons = {
    'Jugement': '⚖️', "Acte d'accusation": '📋', 'Ordonnance': '📜',
    'Requête': '📝', 'Autre': '📄'
  };

  let currentFilter = 'all';

  // Init default docs if needed
  if (!JBSA.store.get('documents')) {
    JBSA.store.set('documents', [
      { id: 1, name: 'Acte d\'accusation — Marcus Webb', category: "Acte d'accusation", caseId: 'SA-2025-0142', author: 'Thomas Johnson', grade: 'prosecutor', date: '2025-03-16', visibility: 'all', notes: 'Chef d\'accusation principal : meurtre au premier degré.' },
      { id: 2, name: 'Ordonnance de mise en détention — Marcus Webb', category: 'Ordonnance', caseId: 'SA-2025-0142', author: 'Hon. Robert Marshall', grade: 'judge', date: '2025-03-17', visibility: 'all', notes: 'Détention provisoire ordonnée sans possibilité de liberté sous caution.' },
      { id: 3, name: 'Requête en irrecevabilité — Diana Torres', category: 'Requête', caseId: 'SA-2025-0118', author: 'Me. Sofia Garcia', grade: 'lawyer', date: '2025-03-05', visibility: 'all', notes: 'Contestation de la légalité de la perquisition.' }
    ]);
  }

  function renderDocs() {
    const docs = JBSA.store.get('documents') || [];
    const cases = JBSA.store.get('cases') || [];

    const visible = docs.filter(d => {
      const matchVis = d.visibility === 'all' || d.visibility === session.grade || session.grade === 'admin';
      const matchCat = currentFilter === 'all' || d.category === currentFilter;
      return matchVis && matchCat;
    });

    const container = document.getElementById('docs-list');
    if (!visible.length) {
      container.innerHTML = '<div class="alert alert-info">ℹ Aucun document disponible.</div>';
      return;
    }

    const g = JBSA.getGradeConfig;
    container.innerHTML = visible.map(d => {
      const c = cases.find(x => x.id === d.caseId);
      return `
      <div class="doc-card">
        <div class="doc-icon">${typeIcons[d.category] || '📄'}</div>
        <div class="doc-info">
          <div class="doc-name">${d.name}</div>
          <div class="doc-meta">
            ${d.category} · ${c ? c.id + ' — ' + c.title.substring(0,30) : '—'} · 
            <span class="badge ${g(d.grade).badgeClass}" style="font-size:0.55rem;">${d.author}</span> · 
            ${JBSA.formatDate(d.date)}
          </div>
          ${d.notes ? `<div style="font-size:0.88rem;color:var(--cream-dark);opacity:0.7;margin-top:0.3rem;">${d.notes}</div>` : ''}
        </div>
        <div class="doc-actions">
          <button class="btn btn-ghost btn-sm" onclick="viewDoc(${d.id})">Voir</button>
          ${session.grade === 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})">×</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function filterDocs(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderDocs();
  }

  function openModal() {
    const cases = JBSA.store.get('cases') || [];
    document.getElementById('d-case').innerHTML = '<option value="">— Aucun —</option>' +
      cases.map(c => `<option value="${c.id}">${c.id} — ${c.title}</option>`).join('');
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function saveDoc() {
    const name = document.getElementById('d-name').value.trim();
    if (!name) { JBSA.showAlert('Nom requis.', 'error'); return; }

    const user = JBSA.getCurrentUser();
    const docs = JBSA.store.get('documents') || [];
    docs.unshift({
      id: Date.now(),
      name,
      category: document.getElementById('d-cat').value,
      caseId: document.getElementById('d-case').value || null,
      author: user ? user.name : session.name,
      grade: session.grade,
      date: new Date().toISOString().split('T')[0],
      visibility: document.getElementById('d-visibility').value,
      notes: document.getElementById('d-notes').value
    });

    JBSA.store.set('documents', docs);
    closeModal();
    renderDocs();
    JBSA.showAlert('Document enregistré.', 'success');
  }

  function viewDoc(id) {
    const docs = JBSA.store.get('documents') || [];
    const d = docs.find(x => x.id === id);
    if (!d) return;
    alert(`📄 ${d.name}\n\nCatégorie : ${d.category}\nAuteur : ${d.author}\nDate : ${JBSA.formatDate(d.date)}\n\n${d.notes || ''}`);
  }

  function deleteDoc(id) {
    if (!confirm('Supprimer ce document ?')) return;
    let docs = JBSA.store.get('documents') || [];
    docs = docs.filter(d => d.id !== id);
    JBSA.store.set('documents', docs);
    renderDocs();
    JBSA.showAlert('Document supprimé.', 'success');
  }

  renderDocs();
</script>
</body>
</html>
